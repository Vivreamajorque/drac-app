<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 192 192" width="192" height="192">
  <defs>
    <radialGradient id="bg" cx="50%" cy="40%" r="60%">
      <stop offset="0%" stop-color="#1E0A3C"/>
      <stop offset="100%" stop-color="#0A0514"/>
    </radialGradient>
    <radialGradient id="glow" cx="50%" cy="50%" r="50%">
      <stop offset="0%" stop-color="#7C5CBF" stop-opacity="0.6"/>
      <stop offset="100%" stop-color="#7C5CBF" stop-opacity="0"/>
    </radialGradient>
    <linearGradient id="bodyGrad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#9B6FE0"/>
      <stop offset="50%" stop-color="#6A3FA8"/>
      <stop offset="100%" stop-color="#4A2C7A"/>
    </linearGradient>
    <linearGradient id="fireGrad" x1="0%" y1="100%" x2="100%" y2="0%">
      <stop offset="0%" stop-color="#FF4500"/>
      <stop offset="50%" stop-color="#FF8C00"/>
      <stop offset="100%" stop-color="#FFD700"/>
    </linearGradient>
    <linearGradient id="wingGrad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#5A3E9E" stop-opacity="0.9"/>
      <stop offset="100%" stop-color="#3D2875" stop-opacity="0.6"/>
    </linearGradient>
    <filter id="glow-filter">
      <feGaussianBlur stdDeviation="3" result="coloredBlur"/>
      <feMerge><feMergeNode in="coloredBlur"/><feMergeNode in="SourceGraphic"/></feMerge>
    </filter>
  </defs>

  <!-- Fond arrondi -->
  <rect width="192" height="192" rx="36" fill="url(#bg)"/>

  <!-- Halo de lumière -->
  <ellipse cx="96" cy="90" rx="70" ry="65" fill="url(#glow)"/>

  <!-- Corps du dragon (forme D stylisée) -->
  <!-- Queue enroulée en bas -->
  <path d="M 58 148 Q 50 165 68 168 Q 85 170 88 158 Q 90 148 78 145" 
        fill="none" stroke="#6A3FA8" stroke-width="10" stroke-linecap="round"/>
  
  <!-- Corps principal — arc du D -->
  <path d="M 58 148 L 56 110 Q 54 70 72 50 Q 92 28 118 38 Q 148 50 150 85 Q 152 118 138 138 Q 122 158 98 160 L 78 158"
        fill="none" stroke="url(#bodyGrad)" stroke-width="14" stroke-linecap="round" stroke-linejoin="round"/>

  <!-- Poitrail / ventre (partie intérieure plus claire) -->
  <path d="M 65 128 L 65 95 Q 64 68 80 54 Q 96 40 114 47 Q 136 57 136 85 Q 136 112 122 130 Q 108 146 88 148 L 72 148"
        fill="none" stroke="#C4A9FF" stroke-width="5" stroke-linecap="round" opacity="0.4"/>

  <!-- Écailles (petits demi-cercles sur le dos) -->
  <path d="M 58 120 Q 52 115 56 108" fill="none" stroke="#8B5FD0" stroke-width="3" stroke-linecap="round"/>
  <path d="M 57 100 Q 51 95 55 88" fill="none" stroke="#8B5FD0" stroke-width="3" stroke-linecap="round"/>
  <path d="M 60 80 Q 54 74 59 68" fill="none" stroke="#8B5FD0" stroke-width="3" stroke-linecap="round"/>
  <path d="M 67 63 Q 62 56 68 51" fill="none" stroke="#8B5FD0" stroke-width="3" stroke-linecap="round"/>

  <!-- Aile gauche -->
  <path d="M 72 78 Q 40 55 28 32 Q 26 24 36 28 Q 52 38 68 62 Q 74 70 72 78Z"
        fill="url(#wingGrad)" stroke="#5A3E9E" stroke-width="1.5" opacity="0.85"/>
  <!-- Nervures de l'aile -->
  <path d="M 72 78 Q 44 58 32 36" fill="none" stroke="#9B6FE0" stroke-width="1" opacity="0.5"/>
  <path d="M 70 72 Q 50 54 40 38" fill="none" stroke="#9B6FE0" stroke-width="1" opacity="0.4"/>

  <!-- Aile droite (derrière le corps) -->
  <path d="M 130 72 Q 158 48 168 26 Q 170 18 160 24 Q 145 34 136 60 Q 132 68 130 72Z"
        fill="url(#wingGrad)" stroke="#5A3E9E" stroke-width="1.5" opacity="0.6"/>

  <!-- Tête du dragon (en haut du D) -->
  <!-- Museau -->
  <ellipse cx="110" cy="36" rx="18" ry="13" fill="url(#bodyGrad)" filter="url(#glow-filter)"/>
  <!-- Mâchoire inférieure -->
  <path d="M 95 40 Q 108 50 128 42" fill="#5A3E9E" stroke="#4A2C7A" stroke-width="1"/>
  <!-- Oeil -->
  <ellipse cx="118" cy="32" rx="5" ry="5" fill="#1A0A2E"/>
  <ellipse cx="118" cy="32" rx="3" ry="3" fill="#FFD700" filter="url(#glow-filter)"/>
  <ellipse cx="118" cy="32" rx="1.5" ry="2" fill="#0A0514"/>
  <circle cx="119" cy="31" r="0.8" fill="white"/>
  <!-- Narine -->
  <ellipse cx="127" cy="38" rx="2" ry="1.5" fill="#3D2875" opacity="0.7"/>
  <!-- Corne -->
  <path d="M 112 24 Q 106 14 102 8" stroke="#C4A9FF" stroke-width="3" stroke-linecap="round" fill="none"/>
  <path d="M 102 8 Q 100 5 104 7" fill="#C4A9FF"/>
  <!-- Petite corne -->
  <path d="M 120 22 Q 116 14 114 10" stroke="#9B6FE0" stroke-width="2" stroke-linecap="round" fill="none"/>

  <!-- Flammes sortant de la bouche -->
  <path d="M 128 42 Q 148 38 158 30 Q 162 26 156 28 Q 148 32 144 36 Q 152 28 158 18 Q 160 14 154 18 Q 146 26 140 34 Q 146 22 148 12 Q 148 8 144 14 Q 138 24 132 38" 
        fill="url(#fireGrad)" opacity="0.9" filter="url(#glow-filter)"/>

  <!-- Griffes en bas (pointe de la queue) -->
  <path d="M 65 165 Q 60 172 55 168" stroke="#8B5FD0" stroke-width="2.5" stroke-linecap="round" fill="none"/>
  <path d="M 70 168 Q 67 176 62 172" stroke="#8B5FD0" stroke-width="2.5" stroke-linecap="round" fill="none"/>
  <path d="M 76 168 Q 75 176 70 174" stroke="#8B5FD0" stroke-width="2.5" stroke-linecap="round" fill="none"/>

  <!-- Lettre D subtile en overlay violet semi-transparent (renforce la lecture) -->
  <text x="96" y="110" font-family="Georgia, serif" font-weight="900" font-size="85" 
        text-anchor="middle" fill="#7C5CBF" opacity="0.07" letter-spacing="-2">D</text>

</svg>