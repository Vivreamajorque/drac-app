<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 192 192" width="192" height="192">
  <defs>
    <radialGradient id="bg" cx="50%" cy="40%" r="65%">
      <stop offset="0%" stop-color="#1E0A3C"/>
      <stop offset="100%" stop-color="#0A0514"/>
    </radialGradient>
    <radialGradient id="glow" cx="50%" cy="50%" r="50%">
      <stop offset="0%" stop-color="#7C5CBF" stop-opacity="0.45"/>
      <stop offset="100%" stop-color="#7C5CBF" stop-opacity="0"/>
    </radialGradient>
    <filter id="soft">
      <feGaussianBlur stdDeviation="12" result="b"/>
      <feMerge><feMergeNode in="b"/><feMergeNode in="SourceGraphic"/></feMerge>
    </filter>
  </defs>

  <!-- Fond arrondi dark violet -->
  <rect width="192" height="192" rx="40" fill="url(#bg)"/>
  
  <!-- Halo violet subtil -->
  <ellipse cx="96" cy="96" rx="78" ry="72" fill="url(#glow)"/>

  <!-- Emoji dragon centré — rendu via foreignObject -->
  <text x="96" y="118" 
        font-size="96" 
        text-anchor="middle" 
        dominant-baseline="middle"
        font-family="Apple Color Emoji, Segoe UI Emoji, Noto Color Emoji, sans-serif">🐉</text>

</svg>